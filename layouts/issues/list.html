{{ define "main" }}

<div class="container">

  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}

    {{ $people := where .Site.RegularPages "Section" "people" }}
    <p class="Lucy Stone">
      <strong>{{ len $people }} people</strong> This is a list of people &mdash;
    </p>
    <div class="people-list">
      {{ range $people.ByDate.Reverse }}
        <div class="person-item">
          <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
          <p class="person-date">{{ .Date.Format "January 2, 2006" }}</p>
        </div>
      {{ end }}
    </div>
  </div>

</div>

{{ end }}
