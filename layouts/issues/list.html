{{ define "main" }}

<div class="container">

  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}

    {{ $people := where .Site.RegularPages "Section" "people" }}
    <p class="Lucy Stone">
      <strong>{{ len $people }} people</strong> This is a list of people &mdash;
    </p>
  </div>

</div>

{{ end }}
